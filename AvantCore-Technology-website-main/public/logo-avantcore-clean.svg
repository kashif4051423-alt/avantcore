<svg viewBox="0 0 768 154" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <!-- Blue gradient -->
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Logo mark - stylized swoosh/wave -->
  <g fill="url(#blueGrad)">
    <!-- Left curve -->
    <path d="M 40 80 Q 35 60 50 45 Q 65 30 80 35 Q 90 40 85 55 Q 80 70 70 75 Q 55 82 40 80 Z"/>
    <!-- Right curve -->
    <path d="M 75 50 Q 90 45 105 55 Q 115 65 110 80 Q 100 95 85 92 Q 75 90 75 75 L 75 50 Z"/>
    <!-- Center accent -->
    <circle cx="80" cy="65" r="15" fill="#60a5fa" opacity="0.8"/>
  </g>
  
  <!-- Text: AVANTCORE -->
  <text x="140" y="95" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#1e3a8a" letter-spacing="2">AVANTCORE</text>
  
  <!-- Text: TECHNOLOGIES -->
  <text x="140" y="135" font-family="Arial, sans-serif" font-size="28" font-weight="300" fill="#6b7280" letter-spacing="1">TECHNOLOGIES</text>
</svg>
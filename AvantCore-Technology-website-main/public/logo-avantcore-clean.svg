<svg viewBox="0 0 768 154" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" width="768" height="154">
  <!-- Define the blue gradient for the logo -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Logo Icon - Stylized wave/swoosh -->
  <g transform="translate(30, 50)" filter="url(#shadow)">
    <!-- Main swoosh shape -->
    <path d="M 0 20 Q 8 5 20 0 Q 28 -2 35 5 Q 40 12 38 25 Q 35 35 25 38 Q 12 40 5 32 Q -2 25 0 20 Z" fill="url(#logoGradient)" stroke="none"/>
    
    <!-- Secondary wave for depth -->
    <path d="M 15 15 Q 22 10 30 12 Q 35 14 34 22 Q 32 28 25 30 Q 18 31 15 25 L 15 15 Z" fill="#60a5fa" opacity="0.8" stroke="none"/>
  </g>
  
  <!-- Text: AVANTCORE TECHNOLOGIES -->
  <text x="100" y="100" font-family="Arial, Helvetica, sans-serif" font-size="60" font-weight="700" fill="#1e40af" letter-spacing="0">AVANTCORE</text>
  <text x="100" y="145" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="300" fill="#64748b" letter-spacing="1">TECHNOLOGIES</text>
</svg>